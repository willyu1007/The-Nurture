version: 1
secrets:
  database_url:
    backend: env
    ref: env://DATABASE_URL
    hint: Set DATABASE_URL to a local Nurture-only PostgreSQL database.
  dev_host_database_url:
    backend: env
    ref: env://DEV_HOST_DATABASE_URL
    hint: Set DEV_HOST_DATABASE_URL to the separate local workflow dev-host database.
  nurture_internal_service_token:
    backend: env
    ref: env://NURTURE_INTERNAL_SERVICE_TOKEN
    hint: Use the same local secret as the My-Chat development worker/API.
