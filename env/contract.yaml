version: 1
variables:
  APP_ENV:
    type: enum
    enum: [dev, staging, prod]
    required: true
    default: dev
    description: Deployment environment profile.
  SERVICE_NAME:
    type: string
    required: true
    default: your-service
    description: Service name (logical).
  PORT:
    type: int
    required: true
    default: 8000
    description: Service listen port.
  DATABASE_URL:
    type: url
    required: true
    secret: true
    secret_ref: database_url
    description: PostgreSQL connection URL for Nurture-owned production schema and migrations.
  DEV_HOST_DATABASE_URL:
    type: url
    required: true
    scopes: [dev]
    secret: true
    secret_ref: dev_host_database_url
    description: PostgreSQL connection URL for backend-private workflow dev-host schema and migrations.
