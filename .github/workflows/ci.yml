name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-contract-pin:
    name: Workflow Contract Pin
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout The-Nurture
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read pinned dependencies
        id: pin
        run: |
          node -e "const fs=require('node:fs'); const pin=require('./docs/project/integrations/my-chat-workflow-contract.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'my_chat_repository='+pin.myChat.repository+'\\nmy_chat_revision='+pin.myChat.revision+'\\nworkflow_base_repository='+pin.myWorkflowBase.repository+'\\nworkflow_base_revision='+pin.myWorkflowBase.revision+'\\n')"

      - name: Checkout My-Chat contract source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.my_chat_repository }}
          ref: ${{ steps.pin.outputs.my_chat_revision }}
          path: .ci-deps/my-chat

      - name: Checkout My-Workflow-Base contract source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.workflow_base_repository }}
          ref: ${{ steps.pin.outputs.workflow_base_revision }}
          path: .ci-deps/my-workflow-base

      - name: Verify revisions and contract hashes
        run: >-
          node scripts/verify-workflow-contract-pin.mjs
          --my-chat-repo .ci-deps/my-chat
          --workflow-base-repo .ci-deps/my-workflow-base

      - name: Test contract hash verifier
        run: node --test scripts/verify-workflow-contract-pin.test.mjs

  governance-lint:
    name: Governance Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint skill sources and wrappers
        run: node .ai/scripts/lint-skills.mjs --strict

      - name: Lint project governance
        run: node .ai/scripts/ctl-project-governance.mjs lint --check --project main

  context-verify:
    name: Context and Environment Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate environment contract
        run: python3 .ai/skills/features/environment/env-contractctl/scripts/env_contractctl.py validate --root .

      - name: Verify context layer
        run: node .ai/skills/features/context-awareness/scripts/ctl-context.mjs verify --repo-root . --strict

  typecheck-unit:
    name: Typecheck and Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout The-Nurture
        uses: actions/checkout@v4
        with:
          path: The-Nurture

      - name: Read pinned source dependencies
        id: pin
        working-directory: The-Nurture
        run: |
          node -e "const fs=require('node:fs'); const pin=require('./docs/project/integrations/my-chat-workflow-contract.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'my_chat_repository='+pin.myChat.repository+'\\nmy_chat_revision='+pin.myChat.revision+'\\nworkflow_base_repository='+pin.myWorkflowBase.repository+'\\nworkflow_base_revision='+pin.myWorkflowBase.revision+'\\n')"

      - name: Checkout My-Chat source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.my_chat_repository }}
          ref: ${{ steps.pin.outputs.my_chat_revision }}
          path: My-Chat

      - name: Checkout My-Workflow-Base source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.workflow_base_repository }}
          ref: ${{ steps.pin.outputs.workflow_base_revision }}
          path: My-Workflow-Base

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: The-Nurture/pnpm-lock.yaml

      - name: Build pinned web-workbench dependency
        run: |
          pnpm --dir My-Workflow-Base/templates/web-workbench install --ignore-workspace --frozen-lockfile
          pnpm --dir My-Workflow-Base/templates/web-workbench build

      - name: Install
        working-directory: The-Nurture
        run: pnpm install --frozen-lockfile

      - name: Generate and validate production Prisma client
        working-directory: The-Nurture
        env:
          DATABASE_URL: postgresql://nurture:nurture@127.0.0.1:5432/nurture?schema=public
          DEV_HOST_DATABASE_URL: postgresql://nurture:nurture@127.0.0.1:5432/nurture_dev_host?schema=public
        run: |
          pnpm db:generate:all
          pnpm db:validate
          pnpm dev-host:db:validate

      - name: Typecheck
        working-directory: The-Nurture
        run: |
          pnpm test:local-env-runner
          pnpm typecheck
          pnpm verify:test-routing
          pnpm verify:persistence-boundaries

      - name: Run unit population
        working-directory: The-Nurture
        run: |
          pnpm test:unit:ci
          pnpm verify:unit-population

  production-db:
    name: Nurture Production DB
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nurture
          POSTGRES_PASSWORD: nurture
          POSTGRES_DB: nurture
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nurture -d nurture"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://nurture:nurture@127.0.0.1:5432/nurture?schema=public
    steps:
      - name: Checkout The-Nurture
        uses: actions/checkout@v4
        with:
          path: The-Nurture

      - name: Read pinned source dependencies
        id: pin
        working-directory: The-Nurture
        run: |
          node -e "const fs=require('node:fs'); const pin=require('./docs/project/integrations/my-chat-workflow-contract.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'my_chat_repository='+pin.myChat.repository+'\\nmy_chat_revision='+pin.myChat.revision+'\\nworkflow_base_repository='+pin.myWorkflowBase.repository+'\\nworkflow_base_revision='+pin.myWorkflowBase.revision+'\\n')"

      - name: Checkout My-Chat source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.my_chat_repository }}
          ref: ${{ steps.pin.outputs.my_chat_revision }}
          path: My-Chat

      - name: Checkout My-Workflow-Base source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.workflow_base_repository }}
          ref: ${{ steps.pin.outputs.workflow_base_revision }}
          path: My-Workflow-Base

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: The-Nurture/pnpm-lock.yaml

      - name: Build pinned web-workbench dependency
        run: |
          pnpm --dir My-Workflow-Base/templates/web-workbench install --ignore-workspace --frozen-lockfile
          pnpm --dir My-Workflow-Base/templates/web-workbench build

      - name: Install
        working-directory: The-Nurture
        run: pnpm install --frozen-lockfile

      - name: Generate and deploy Nurture schema
        working-directory: The-Nurture
        run: |
          pnpm db:generate
          pnpm db:validate
          pnpm db:deploy

      - name: Assert production ownership boundary
        working-directory: The-Nurture
        run: pnpm db:assert-boundary

      - name: Run production DB population
        working-directory: The-Nurture
        run: |
          pnpm test:db:ci
          pnpm verify:db-population

  dev-host-db:
    name: Backend Dev-Host DB and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nurture
          POSTGRES_PASSWORD: nurture
          POSTGRES_DB: nurture
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nurture -d nurture"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://nurture:nurture@127.0.0.1:5432/nurture?schema=public
      DEV_HOST_DATABASE_URL: postgresql://nurture:nurture@127.0.0.1:5432/nurture_dev_host?schema=public
      PGPASSWORD: nurture
    steps:
      - name: Checkout The-Nurture
        uses: actions/checkout@v4
        with:
          path: The-Nurture

      - name: Read pinned source dependencies
        id: pin
        working-directory: The-Nurture
        run: |
          node -e "const fs=require('node:fs'); const pin=require('./docs/project/integrations/my-chat-workflow-contract.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'my_chat_repository='+pin.myChat.repository+'\\nmy_chat_revision='+pin.myChat.revision+'\\nworkflow_base_repository='+pin.myWorkflowBase.repository+'\\nworkflow_base_revision='+pin.myWorkflowBase.revision+'\\n')"

      - name: Checkout My-Chat source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.my_chat_repository }}
          ref: ${{ steps.pin.outputs.my_chat_revision }}
          path: My-Chat

      - name: Checkout My-Workflow-Base source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.workflow_base_repository }}
          ref: ${{ steps.pin.outputs.workflow_base_revision }}
          path: My-Workflow-Base

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: The-Nurture/pnpm-lock.yaml

      - name: Build pinned web-workbench dependency
        run: |
          pnpm --dir My-Workflow-Base/templates/web-workbench install --ignore-workspace --frozen-lockfile
          pnpm --dir My-Workflow-Base/templates/web-workbench build

      - name: Install
        working-directory: The-Nurture
        run: pnpm install --frozen-lockfile

      - name: Create separate dev-host database
        run: psql -h 127.0.0.1 -p 5432 -U nurture -d postgres -v ON_ERROR_STOP=1 -c 'CREATE DATABASE nurture_dev_host'

      - name: Generate and deploy both schemas
        working-directory: The-Nurture
        run: |
          pnpm db:generate:all
          pnpm db:deploy
          pnpm dev-host:db:deploy

      - name: Assert both ownership boundaries
        working-directory: The-Nurture
        run: |
          pnpm db:assert-boundary
          pnpm dev-host:db:assert-boundary

      - name: Run dev-host E2E population
        working-directory: The-Nurture
        run: |
          pnpm test:dev-host:ci
          pnpm verify:dev-host-population

  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout The-Nurture
        uses: actions/checkout@v4
        with:
          path: The-Nurture

      - name: Read pinned source dependencies
        id: pin
        working-directory: The-Nurture
        run: |
          node -e "const fs=require('node:fs'); const pin=require('./docs/project/integrations/my-chat-workflow-contract.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'my_chat_repository='+pin.myChat.repository+'\\nmy_chat_revision='+pin.myChat.revision+'\\nworkflow_base_repository='+pin.myWorkflowBase.repository+'\\nworkflow_base_revision='+pin.myWorkflowBase.revision+'\\n')"

      - name: Checkout My-Chat source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.my_chat_repository }}
          ref: ${{ steps.pin.outputs.my_chat_revision }}
          path: My-Chat

      - name: Checkout My-Workflow-Base source dependency
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pin.outputs.workflow_base_repository }}
          ref: ${{ steps.pin.outputs.workflow_base_revision }}
          path: My-Workflow-Base

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: The-Nurture/pnpm-lock.yaml

      - name: Build pinned web-workbench dependency
        run: |
          pnpm --dir My-Workflow-Base/templates/web-workbench install --ignore-workspace --frozen-lockfile
          pnpm --dir My-Workflow-Base/templates/web-workbench build

      - name: Install
        working-directory: The-Nurture
        run: pnpm install --frozen-lockfile

      - name: Lint and build
        working-directory: The-Nurture
        env:
          DATABASE_URL: postgresql://nurture:nurture@127.0.0.1:5432/nurture?schema=public
          DEV_HOST_DATABASE_URL: postgresql://nurture:nurture@127.0.0.1:5432/nurture_dev_host?schema=public
        run: |
          pnpm lint
          pnpm build
